<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Not Found</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }
    .container {
      max-width: 400px;
    }
    .code {
      font-size: 5rem;
      font-weight: 700;
      color: #ddd;
      line-height: 1;
      margin-bottom: 12px;
    }
    h1 {
      font-size: 1.3rem;
      font-weight: 600;
      margin-bottom: 8px;
    }
    p {
      color: #999;
      font-size: 0.95rem;
      margin-bottom: 24px;
    }
    a {
      display: inline-block;
      padding: 10px 24px;
      background: #333;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 0.9rem;
    }
    a:hover { background: #555; }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist.</p>
    <a href="/">Back to home</a>
  </div>
</body>
</html>
