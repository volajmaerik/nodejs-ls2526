<section class="rickroll">
  <div class="rickroll-media">
    <img
      src="https://i.ytimg.com/vi/dQw4w9WgXcQ/maxresdefault.jpg"
      alt="Rick Astley in the Never Gonna Give You Up video"
    >
  </div>
  <div class="rickroll-content">
    <h2>Emergency Motivation Mode</h2>
    <p>When productivity drops, deploy the Rickroll protocol. Strictly scientific.</p>
    <audio id="rickroll-audio" controls preload="metadata">
      <source src="/assets/rickroll.mp3" type="audio/mpeg">
      Your browser does not support audio playback.
    </audio>
    <div class="rickroll-actions">
      <button id="rickroll-toggle" class="rickroll-button" type="button">Play Rickroll</button>
    </div>
  </div>
</section>
